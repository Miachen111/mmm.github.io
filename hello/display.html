<!DOCTYPE html>
<html>
<style>
table,th,td{
    text-align: left;
    border:2px solid black;
    border-collapse: collapse;
}
th{
    background-color: gray;
    color:white;
    text-align: center;
}
tr:nth-child(even){
    background-color: yellow;

}
div.fixed{
    border: 3px solid green;
    position: fixed;
    top: 0;
    right: 0;
    width: 100px;
    height: 200px;
}
</style>
<table>
    <tr>
        <th>Firstname</th>
        <th>Lastname</th>
    </tr>
    <tr>
        <td>1</td>
        <td>1</td>
    </tr>
    <tr>
        <td>2</td>
        <td>2</td>
    </tr>
    <tr>
        <td>3</td>
        <td>3</td>
    </tr>

</table>
<div class="fixed">
    This div has position: fixed;
</div>
</html>
