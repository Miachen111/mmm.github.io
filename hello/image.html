<!DOCTYPE html>
<html>
<style>
.img1{
  border-radius: 18px;
  padding: 5px;
  width: 33%;
  height: 300px;

}
.img2{
    border: 1px solid black;
    border-radius: 50%;
    width: 150px;
    height: 150px;
    vertical-align: top;
}
.img3{
  padding: 5px;
  width: 33%;
  height: 300px;
  object-fit: fill;
}

</style>

<body>
<img class="img1"src="https://www.w3schools.com/css/paris.jpg">

<img class="img2" src="https://www.w3schools.com/css/img_5terre.jpg">

</body>
</html>
