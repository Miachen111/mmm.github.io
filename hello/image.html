<!DOCTYPE html>
<html>
<style>
.img1{
  border-radius: 18px;
  padding: 5px;
  width: 33%;
  height: 300px;
  object-fit: none;
}
.img2{
    border: 1px solid black;
    border-radius: 50%;
    width: 150px;
    height: 150px;

}
.img3{
  border-radius: 18px;
  padding: 5px;
  width: 33%;
  height: 300px;
  object-fit: fill;
}

</style>

<body>
<div class="img1">
<img src="https://www.w3schools.com/css/paris.jpg">
</div>

<div class="img2">
<img src="https://www.w3schools.com/css/img_5terre.jpg">
</div>

<div class="img3">
<img src="https://www.w3schools.com/css/paris.jpg">
</div>



</body>
</html>
