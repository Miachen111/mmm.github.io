<!DOCTYPE html>
<html>
<style>
    .one{
        text-decoration: overline;
        text-align: left;
        text-shadow: 2px 2px pink;
    }
    .two{
        outline: thick ridge yellow;
        text-align: left;
        font-style: oblique;
    }
    .three{
        text-align: right;
        text-decoration: underline;
    }

</style>
<body>
    <h1 class="one">This is heading 1</h1>
    <h2 class="two">This is heading 2</h2>
    <h3 class="three">This is heading 3</h3>
</body>
</html>
