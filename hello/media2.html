<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }



  .row {
    display: flex;
    flex-wrap: wrap; /* 允許換行 */
    gap: 10px;
    margin-bottom: 10px;
  }

  .box {
    border-radius: 4px;
    min-height: 80px;
  }

  /* 1. 頂部綠色區塊：永遠佔滿 100% */
  .green-header {
    width: 100%;
    background-color: #badc58;
    height: 120px;
  }

  /* 2. 中間藍色區塊：大螢幕時三欄並排 (100% / 3) */
  .blue-item {
    background-color: #63c2d1;
    flex: 1; /* 自動分配空間 */
    min-width: 100px; /* 防止縮得太小 */
    height: 150px;
  }

  /* 3. 下方灰色區塊：大螢幕時四欄並排 (100% / 4) */
  .gray-item {
    background-color: #f1f2f6;
    flex: 1;
    height: 50px;
  }

  /* --- 關鍵區域：當螢幕小於 480px (圖 a) --- */
  @media screen and (max-width: 480px) {
    .row {
      flex-direction: column; /* 強制所有東西變垂直排列 */
    }

    .blue-item, .gray-item {
      width: 100%; /* 強制寬度變成 100% */
      flex: none;  /* 關閉自動分配，改用 100% 寬度 */
    }
    
    .green-header {
        height: 100px;
    }
  }
</style>
</head>
<body> 

<div class="container">
  <div class="row">
    <div class="box green-header"></div>
  </div>

  <div class="row">
    <div class="box blue-item"></div>
    <div class="box blue-item"></div>
    <div class="box blue-item"></div>
  </div>

  <div class="row">
    <div class="box gray-item"></div>
    <div class="box gray-item"></div>
    <div class="box gray-item"></div>
    <div class="box gray-item"></div>
  </div>
</div>

</body>
</html>
