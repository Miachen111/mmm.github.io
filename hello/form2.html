<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; padding: 50px; background-color: #f0f0f0; }

  /* 面板主容器 */
  .panel {
    width: 496px; 
    background-color: white;
    border: 1px solid #ddd;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  /* 核心功能：隱藏的勾選框 */
  #toggle-check {
    display: none;
  }

  /* 頂部 Header */
  .panel-header {
    height: 35px;
    background-color: #f6f6f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 15px;
    border-bottom: 1px solid #eaeaea;
  }

  .title { font-size: 13px; color: #707070; }

  /* 按鈕樣式 (h22/R8) */
  .btn-info {
    height: 22px;
    border-radius: 8px;
    border: 1px solid #2f2f2f;
    background-color: #ffffff;
    font-size: 13px;
    padding: 0 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    user-select: none;
  }

  /* 圖片區域 */
  .image-container {
    padding: 20px;
    text-align: center;
  }

  .main-img {
    width: 450px;
    height: 240px;
    background-color: #ddd; /* 沒圖片時顯示灰色塊 */
    object-fit: fill;
  }

  /* 展開的資訊面板 (預設隱藏) */
  .info-details {
    display: none; /* 初始隱藏 */
    padding: 15px;
    background-color: #ffffff;
    border-top: 1px solid #eaeaea;
    font-size: 13px;
  }

  /* --- 關鍵觸發邏輯 --- */

  /* 1. 當勾選時，顯示資訊面板 (使用 ~ 符號) */
  #toggle-check:checked ~ .info-details {
    display: block;
  }

  /* 2. 當勾選時，切換按鈕文字內容 */
  .text-close { display: none; }
  #toggle-check:checked ~ .panel-header .text-open { display: none; }
  #toggle-check:checked ~ .panel-header .text-close { display: inline; }

  /* 3. 當勾選時，按鈕變色 (選配，增加互動感) */
  #toggle-check:checked ~ .panel-header .btn-info {
    background-color: #eee;
  }
</style>
</head>
<body>

  <div class="panel">
    <input type="checkbox" id="toggle-check">

    <div class="panel-header">
      <span class="title">預覽</span>
      <label for="toggle-check" class="btn-info">
        <span class="text-open">查看資訊</span>
        <span class="text-close">收起資訊</span>
      </label>
    </div>

    <div class="image-container">
      <img src="https://www.w3schools.com/css/paris.jpg" alt="Preview" class="main-img">
    </div>

    <div class="info-details">
      
      <p>修改日期：2017/10/12</p>
      <p>檔案類型：JPG</p>
      <p>尺寸大小：466.97KB</p>
      <p>存放路徑：\\designcenter.qnap.com.tw\DesignCenter\PM</p>
    </div>
  </div>

</body>
</html>
