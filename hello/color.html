<!DOCTYPE html>
<html>
<style>
    p.one{
        background-color:#8ac2f2;
        border-style:double;
        border-width: 5px;
        border-color: tomato;
    }
    p.two{
        background-color:yellow;
        border-style:solid;
        border-radius: 10px;
        border-width: 2px;
        border-color: #68acdd;
    }
    p.three{
        background-color:#469e46;
        border-style:dotted;
        border-width:5px;
        border-color: #9846b6;
    }

</style>
<body>
    <p class="one">Hello World</p>
    <p class="two">Hello World</p>
    <p class="three">Hello World</p>
</body>
</html>
