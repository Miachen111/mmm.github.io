<!DOCTYPE html>
<html>
<style>

.top-panel{
    background-color: #a5a0a0;
    height: 35px;
    width: 496px;
    padding: 15px;

}

p.title{
    color:#535050;
    font-size: 13px;
    font-family: 'roboto';
}

input[type=button]{
    background-color:#ffffff;
    border: 1px solid #2f2f2f;
    color:#2f2f2f;
    height: 22px;
    border-radius:8px;
    font-family: 'roboto';
    font-size: 13px;


}

.block{
    width: 496px;
    height: 240px;
    padding: 20px;
    background-color: white;
    position: relative;
}

.img{
    width: 450px;
    height: 240px;
    object-fit: cover;
}

p.later {
  position: absolute;
  right: 20px;
  bottom: 20px;
  width: 250px;
  background-color: #f3f3f3;
  border: 1px solid #eaeaea;
  padding: 10px;
  font-size: 13px;
  line-height: 1.6;
  display:none;
}

#toggle-check:checked ~ .info-details {
    display: block;
  }

</style>
<body>

    <div class="top-panel">
        <div class="title">預覽</div>
        <input type="checkbox" id="toggle-check">
      <label for="toggle-check" class="btn-info">
        <span class="text-open">查看資訊</span>
        <span class="text-close">收起資訊</span>
      </label>
    </div>
        
            
    <div class="block">
        <img class="img"src="https://www.w3schools.com/css/paris.jpg"></div>

    </div>

</html>
